<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Library</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" async></script>
</head>

<body>
  <header>Odin Library</header>

  <div class="button-area">
    <button type="button" class="add-book-button">+ Add Book</button>
  </div>

  <div class="book-display"></div>

  <dialog>
    <div>

      <button class="close-button">X</button>
      <div>
        <form>
          <div autofocus>
            <label for="form-author">Author:</label>
            <input type="text" id="form-author" maxlength="100">
          </div>
          <div>
            <label for="form-title">Book Title:</label>
            <input type="text" id="form-title" maxlength="100">
          </div>
          <div>
            <label for="form-page-number">Number of pages:</label>
            <input type="number" id="form-page-number" min="0" max="11000">
          </div>
          <div>
            <label for="form-release-date">Release Date:</label>
            <input type="number" id="form-release-date" min="-300000" max="10000">
          </div>
        </form>
      </div>

      <button class="submit-button" type="submit">O</button>
    </div>
  </dialog>

</body>

</html>
