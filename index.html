<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Library</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" async></script>
</head>

<body>
  <header>Odin Library</header>

  <div class="button-area">
    <button type="button" class="add-book-button">+ Add Book</button>
  </div>

  <div class="book-display"></div>

  <dialog>
    <div>

      <div class="close-button-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="close-button">
          <path
            d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
        </svg>
      </div>

      <div>
        <form action="" method="get" id="book-form">

          <div autofocus>
            <label for="form-author">Author:</label>
            <input type="text" id="form-author" maxlength="50" required>
          </div>

          <div>
            <label for="form-title">Book Title:</label>
            <input type="text" id="form-title" maxlength="50" required>
          </div>

          <div>
            <label for="form-pages">Number of pages:</label>
            <input type="number" id="form-pages" min="0" max="11000" required>
          </div>

          <div>
            <label for="form-release-date">Release Date:</label>
            <input type="number" id="form-release-date" min="-300000" max="10000" required>
          </div>

        </form>
      </div>

      <button type="submit" form="book-form" class="submit-button">Add book to library</button>

    </div>
  </dialog>

</body>

</html>
